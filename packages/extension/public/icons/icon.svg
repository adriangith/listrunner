<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D7FF9"/>
      <stop offset="1" stop-color="#1455B5"/>
    </linearGradient>
    <linearGradient id="paper" x1="26" y1="20" x2="88" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F0F4F8"/>
    </linearGradient>
    <linearGradient id="accent" x1="75" y1="40" x2="110" y2="95" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFDE59"/>
      <stop offset="1" stop-color="#FF914D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#001233" flood-opacity="0.3"/>
    </filter>
    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Shape -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)" />
  <rect x="8" y="8" width="112" height="112" rx="26" stroke="white" stroke-opacity="0.15" stroke-width="2" />

  <!-- Rotated List Content -->
  <g transform="rotate(-5 60 64)">
    <rect x="26" y="22" width="62" height="84" rx="6" fill="url(#paper)" filter="url(#shadow)" />

    <!-- Check 1 -->
    <path d="M 36 44 L 42 50 L 50 36" stroke="#2D7FF9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="58" y="41" width="20" height="6" rx="3" fill="#C9D6E8" />

    <!-- Check 2 -->
    <path d="M 36 64 L 42 70 L 50 56" stroke="#2D7FF9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="58" y="61" width="14" height="6" rx="3" fill="#C9D6E8" />

    <!-- Unchecked Item -->
    <rect x="36" y="81" width="36" height="6" rx="3" fill="#E2E8F0" />
  </g>

  <!-- Magic Sparkles (Wizard motif) -->
  <g filter="url(#sparkleGlow)">
    <!-- Big Sparkle -->
    <path d="M 75 80 Q 92 80 92 63 Q 92 80 109 80 Q 92 80 92 97 Q 92 80 75 80 Z" fill="url(#accent)"/>
    <!-- Small Sparkle -->
    <path d="M 94 48 Q 102 48 102 40 Q 102 48 110 48 Q 102 48 102 56 Q 102 48 94 48 Z" fill="url(#accent)"/>
  </g>
</svg>
